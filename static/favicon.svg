<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Bus Bunching Tracker">
	<rect width="64" height="64" rx="14" fill="#1f2937" />
	<!-- trailing bus peeking out behind: the "bunching" cue -->
	<rect x="7" y="16" width="30" height="21" rx="5" fill="#4b5563" opacity="0.75" />
	<!-- main bus body -->
	<rect x="17" y="19" width="30" height="20" rx="5" fill="#ffffff" />
	<!-- windows -->
	<rect x="20" y="22.5" width="24" height="7" rx="2" fill="#1f2937" />
	<!-- wheels -->
	<circle cx="25" cy="36" r="2.6" fill="#1f2937" />
	<circle cx="39" cy="36" r="2.6" fill="#1f2937" />
</svg>
